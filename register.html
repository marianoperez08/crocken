<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="shortcut icon" href="/assets/img/icono-crocken.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Crocken</title>

<body>
    <header>
      <img src="./assets/img/logo-crocken.png" alt="Logo de Crocken" class="logo" />
      <nav class="navbar">
        <ul class="navbar-list">
          <li><a href="">Inicio</a></li>
          <li><a href="">Menú</a></li>
          <li><a href="">Contacto</a></li>
          <li><a href="">Locales</a></li>
          <li><a href="">Nosotros</a></li>
        </ul>

          <i class="fa-solid fa-cart-shopping"></i> 
          <i class="fa-solid fa-user"></i>
        </div>
      </nav>
    </header>
    <main class="register">
      <section class="form">
        <div class="options">
          <a href="">Iniciar Sesión</a>
          <a href="">Registrarse</a>
        </div>
        <form>
          <input type="text" placeholder="Usuario o e-mail"><br>
          <input type="password" name="" id="" placeholder="*******"><br>
          <button type="submit">Ingresar</button>
          <p>¿Olvidó su contraseña?</p>
        </form>
        
      </section>
    </main>
    <footer>
      <div class="navfooter">
        <img src="/assets/img/logo-crocken.png" alt=""><div class="footer-icons">
        <i class="fa-brands fa-whatsapp"></i>
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
      </div>
      </div>
      
      <span>Copyright © 2023 Crocken.</span>
